<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<title>Ankush Portfolio</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
}

/* Navbar */
.navbar {
    padding: 15px 0;
    transition: all 0.3s ease;
}

.navbar-brand {
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 1px;
}

/* Nav links */
.nav-link {
    position: relative;
    margin: 0 10px;
    font-weight: 500;
    color: #ccc !important;
    transition: 0.3s;
}

/* Hover underline animation */
.nav-link::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: 0;
    left: 0;
    background: #00d4ff;
    transition: 0.3s;
}

.nav-link:hover {
    color: #fff !important;
}

.nav-link:hover::after {
    width: 100%;
}

/* Active link */
.nav-link.active {
    color: #fff !important;
}

/* Navbar shadow */
.navbar {
    background: rgba(0, 0, 0, 0.85) !important;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Main content spacing */
.main-container {
    padding: 60px 20px;
}

/* Smooth scroll */
html {
    scroll-behavior: smooth;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand" href="/home">Ankush</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="nav">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link {% block homeactive %}{% endblock %}" href="/home">Home</a>
</li>

<li class="nav-item">
<a class="nav-link {% block projectsactive %}{% endblock %}" href="/project">Projects</a>
</li>

<li class="nav-item">
<a class="nav-link {% block aboutactive %}{% endblock %}" href="/about">About</a>
</li>

<li class="nav-item">
<a class="nav-link {% block contactactive %}{% endblock %}" href="/contact">Contact</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- BODY CONTENT -->
<div class="main-container">
    {% block body %}
    {% endblock body %}
</div>

</body>
</html>
