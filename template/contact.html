<!doctype html>
{% extends "base.html" %}
{% block contactactive %}active{% endblock %}
{% block body %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <title>Contact</title>
    <style>
body{
  min-height:100vh;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
    url("https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
}
.container{
  background: rgba(0,0,0,0.55);
  padding:40px;
  border-radius:15px;
  backdrop-filter: blur(8px);
}
</style>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="p-0 m-0  border-0 bd-example m-0 border-0">

          <div class="container">
        <h1 class="text-center py-4 mx-2 ">Contact me</h1>
            <form action="/contact" method="post">
              {% csrf_token %}
            <div class="input-group mb-3">
  <span class="input-group-text " name="name">Name</span>
  <input type="text" class="form-control"   name="name" placeholder="" aria-label="Username" aria-describedby="basic-addon1">
</div>
            <div class="input-group my-3">
  <span class="input-group-text" id="basic-addon1">Email id</span>
  <input type="email" class="form-control" id="email" name="email" placeholder="" aria-label="Username" aria-describedby="basic-addon1">
</div>
<div class="my-3">

  <div class="input-group">




<div class="input-group my-3">
  <span class="input-group-text">Suggestion</span>
  <textarea class="form-control" id="desc" name="desc" aria-label="With textarea"></textarea>
</div>
    <div class="mb-3">
      <button type="submit" class="btn btn-success ">Submit</button>

    </div>
  </div>
{%endblock body%}
  </body>
</html>
